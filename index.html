<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultas</title>
    <link rel="stylesheet" href="./styles/reset.css">
    <link rel="stylesheet" href="./styles/styles.css">
</head>
<body>
    
    <header>
        <p class="cabecalho__horas">03:33</p>
        <div class="cabecalho__icones">
            <img src="./assets/signal_cellular_4_bar.svg" alt="Sinal do Celular">
            <img src="./assets/battery_full.svg" alt="Bateria do Celular">
            <img src="./assets/wifi.svg" alt="Wifi">
        </div>
    </header>

    <main class="container">

       <section class="container__perfil">
            <img src="./assets/Ellipse 4.svg" alt="Imagem da Sônia" class="container__perfil__imagem">
            <div class="container__perfil__infos">
                <h1 class="container__perfil__infos-nome">Olá, Sônia</h1>
                <p class="container__perfil__infos-consultas">Mais 4 consultas hoje</p>
            </div>
       </section> 

        <h2 class="container__data">Hoje</h2>

       <section class="card">

            <div class="card__perfil">
                <img src="./assets/Luciana.svg" alt="Foto de Luciana Dias" class="card__foto">
                <div class="card__infos">
                    <h3 class="card__nome">Luciana Dias</h3>
                    <div class="card__consulta">
                        <img src="./assets/Camera.svg" alt="" class="card__consulta-icone">
                        <p class="card__consulta-texto">Consulta remota</p>
                    </div>
                </div>
                <img src="./assets/Chatcirculo1.svg" alt="Botão Chat" class="card__icone-chat">
            </div>   

            <hr class="card__divisor">

            <div class="card__opcoes">
                <p class="card__horarios">14:00 - 15:00 (1 hora)</p>
                <ul class="card__botoes">
                    <li class="card__botao-video">
                        <a href="#" class="card__botao-video-link">Ligar por vídeo</a>
                    </li>
                    <li class="card__botao-audio">
                        <a href="#" class="card__botao-audio-link">Ligar por áduio</a>
                    </li>
                </ul>
            </div>
       </section>

    </main>


</body>
</html>
